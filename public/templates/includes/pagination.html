{% if total_items > 1 %}
<!-- 桌面端分页 -->
<div class="pagination-container desktop-pagination">
    <div class="pagination-wrapper">
        {% if has_prev %}
        <a href="{{prev_url}}" class="btn btn-secondary">« 上一页</a>
        {% endif %}

        <div class="pagination-info">
            <span>第 {{current_page}} 页</span>
            <span class="pagination-total">共 {{total_pages}} 页</span>
            <span class="pagination-items">{{total_items}} {{item_name}}</span>
        </div>

        {% if has_next %}
        <a href="{{next_url}}" class="btn btn-secondary">下一页 »</a>
        {% endif %}
    </div>
</div>

<!-- 移动端加载更多 -->
<div class="mobile-load-more" id="loadMoreContainer">
    <div class="load-more-info">
        <span>已加载 <span id="loadedCount">{{current_page}}</span>/{{total_pages}} 页</span>
    </div>
    {% if has_next %}
    <button class="btn btn-load-more" id="loadMoreBtn" data-next-url="{{next_url}}" data-current-page="{{current_page}}" data-total-pages="{{total_pages}}">
        <span class="load-text">加载更多</span>
        <span class="loading-text" style="display:none;">加载中...</span>
    </button>
    {% endif %}
</div>

<style>
.pagination-container { margin: 2rem 0; }
.pagination-wrapper { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 1rem; 
    flex-wrap: wrap; 
    padding: 0 1rem;
}
.pagination-info { 
    display: flex;
    flex-direction: column; 
    align-items: center; 
    gap: 0.25rem; 
    color: #6c757d;
    font-size: 0.9rem;
}
.pagination-total { font-size: 0.8rem; }
.pagination-items { font-size: 0.8rem; }

/* 移动端加载更多样式 */
.mobile-load-more {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    margin: 1.5rem 0;
    padding: 0 1rem;
}
.load-more-info {
    color: #6c757d;
    font-size: 0.85rem;
}
.btn-load-more {
    width: 100%;
    max-width: 300px;
    padding: 0.75rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 25px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.3s ease;
}
.btn-load-more:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}
.btn-load-more:disabled {
    background: #6c757d;
    cursor: not-allowed;
    transform: none;
}

@media (max-width: 768px) {
    .desktop-pagination { display: none; }
    .mobile-load-more { display: flex; }
    .pagination-wrapper { gap: 0.75rem; padding: 0 0.5rem; }
    .pagination-info { font-size: 0.8rem; display: none; }
    .btn { flex: 1; min-width: 100px; text-align: center; font-size: 0.9rem; }
}

@media (min-width: 769px) {
    .mobile-load-more { display: none; }
}
</style>

<script>
(function() {
    var loadMoreBtn = document.getElementById('loadMoreBtn');
    if (!loadMoreBtn) return;
    
    var isLoading = false;
    var nextPageUrl = loadMoreBtn.getAttribute('data-next-url');
    var currentPage = parseInt(loadMoreBtn.getAttribute('data-current-page'));
    var totalPages = parseInt(loadMoreBtn.getAttribute('data-total-pages'));
    
    // 滚动加载检测
    function checkScrollLoad() {
        if (isLoading || !nextPageUrl) return;
        
        var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        var windowHeight = window.innerHeight;
        var docHeight = document.documentElement.scrollHeight;
        
        // 距离底部200px时触发加载
        if (scrollTop + windowHeight >= docHeight - 200) {
            loadMore();
        }
    }
    
    // 加载更多
    function loadMore() {
        if (isLoading || !nextPageUrl) return;
        
        isLoading = true;
        var loadText = loadMoreBtn.querySelector('.load-text');
        var loadingText = loadMoreBtn.querySelector('.loading-text');
        
        loadText.style.display = 'none';
        loadingText.style.display = 'inline';
        loadMoreBtn.disabled = true;
        
        // 跳转到下一页（简单方案）
        window.location.href = nextPageUrl;
    }
    
    // 按钮点击事件
    loadMoreBtn.addEventListener('click', loadMore);
    
    // 滚动监听（节流）
    var scrollTimeout;
    window.addEventListener('scroll', function() {
        if (scrollTimeout) clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(checkScrollLoad, 100);
    });
})();
</script>
{% endif %}
